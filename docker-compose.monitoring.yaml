services:
  app:
    environment:
      OTEL_TRACING_ENABLED: ${OTEL_TRACING_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-betalent-payment-gateway}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://tempo:4318/v1/traces}

  prometheus:
    image: prom/prometheus:v3.4.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.5
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - '${LOKI_PORT:-3100}:3100'
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.5
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.8.1
    command:
      - -config.file=/etc/tempo/config.yml
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    ports:
      - '${TEMPO_PORT:-3200}:3200'
      - '${OTLP_HTTP_PORT:-4318}:4318'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3005}:3000'
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
